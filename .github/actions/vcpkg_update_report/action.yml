name: Compare vcpkg install changes
description: Compares vcpkg install outputs between the base and head refs on pull requests and generates a report.

inputs:
  vcpkg-manifest-dir:
    description: 'Directory containing the vcpkg.json manifest'
    required: true
    default: '.'
    type: string
  triplet:
    description: 'Triplet to use for vcpkg installation'
    required: true
    default: 'x64-linux'
    type: string

outputs:
  report:
    description: 'The report of added and removed packages after vcpkg installation comparison'

runs:
  using: "composite"
  steps:
    # Run vcpkg install --dry-run on the head ref
    - name: Run vcpkg install (HEAD)
      shell: bash
      run: |
        vcpkg install --dry-run --triplet ${{ inputs.triplet }} --x-manifest-root=${{ inputs.vcpkg-manifest-dir }} > vcpkg-head-output.txt

    # Checkout the base ref (target branch)
    - name: Checkout BASE ref
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.base.sha }}
        path: base-ref

    # Run vcpkg install --dry-run on the base ref
    - name: Run vcpkg install (BASE)
      shell: bash
      run: |
        vcpkg install --dry-run --triplet ${{ inputs.triplet }} --x-manifest-root=base-ref/${{ inputs.vcpkg-manifest-dir }} > vcpkg-base-output.txt


    # Compare the outputs and generate a report
    - name: Compare vcpkg outputs
      shell: bash
      id: compare
      run: |
        echo "Comparing vcpkg install outputs..."

        # Use diff to find differences between base and head
        diff vcpkg-base-output.txt vcpkg-head-output.txt > vcpkg-diff.txt || true

        # Parse the diff to get added, removed, and changed packages
        added=$(grep '^> ' vcpkg-diff.txt | sed 's/^> //g' || true)
        removed=$(grep '^< ' vcpkg-diff.txt | sed 's/^< //g' || true)

        # Prepare the report
        echo "### vcpkg installation changes report" > vcpkg-report.txt
        if [ -n "$added" ]; then
          echo "#### Added packages:" >> vcpkg-report.txt
          echo "$added" >> vcpkg-report.txt
        else
          echo "#### No added packages." >> vcpkg-report.txt
        fi

        if [ -n "$removed" ]; then
          echo "#### Removed packages:" >> vcpkg-report.txt
          echo "$removed" >> vcpkg-report.txt
        else
          echo "#### No removed packages." >> vcpkg-report.txt
        fi

        cat vcpkg-head-output.txt
        echo "2222"
        echo "xxxx"
        cat vcpkg-diff.txt
        echo "yyyy"
        cat vcpkg-report.txt
        {
          echo 'report<<EOF'
          cat vcpkg-report.txt
          echo EOF
        } >> "$GITHUB_OUTPUT"
